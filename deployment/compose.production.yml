services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      CONTAINERS: 1
      EVENTS: 1
      INFO: 1
      NETWORKS: 1
      VERSION: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:2375/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  traefik:
    image: traefik:v3.6
    env_file:
      - ./.env
    command:
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://docker-socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=0"
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=0"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=3600"
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/letsencrypt
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  migrate:
    image: ghcr.io/techulus/cloud/web:tip
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_URL=https://${ROOT_DOMAIN}
      - APP_URL=https://${ROOT_DOMAIN}
      - VICTORIA_LOGS_URL=https://${VL_USERNAME}:${VL_PASSWORD}@logs.${ROOT_DOMAIN}
      - VICTORIA_LOGS_PRIVATE_URL=http://${VL_USERNAME}:${VL_PASSWORD}@victoria-logs:9428
      - REGISTRY_URL=registry:5000
      - REGISTRY_HOST=registry.${ROOT_DOMAIN}
      - INNGEST_BASE_URL=http://inngest:8288
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
      - ALLOW_SIGNUP=${ALLOW_SIGNUP:-false}
    command: ["sh", "-c", "echo y | npx drizzle-kit push"]
    restart: on-failure

  web:
    image: ghcr.io/techulus/cloud/web:tip
    scale: ${WEB_REPLICAS:-1}
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_URL=https://${ROOT_DOMAIN}
      - APP_URL=https://${ROOT_DOMAIN}
      - VICTORIA_LOGS_URL=https://${VL_USERNAME}:${VL_PASSWORD}@logs.${ROOT_DOMAIN}
      - VICTORIA_LOGS_PRIVATE_URL=http://${VL_USERNAME}:${VL_PASSWORD}@victoria-logs:9428
      - REGISTRY_URL=registry:5000
      - REGISTRY_HOST=registry.${ROOT_DOMAIN}
      - INNGEST_BASE_URL=http://inngest:8288
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
      - ALLOW_SIGNUP=${ALLOW_SIGNUP:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully
      victoria-logs:
        condition: service_started
      registry:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${ROOT_DOMAIN}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  registry:
    image: ghcr.io/techulus/cloud/registry:tip
    env_file:
      - ./.env
    volumes:
      - registry-data:/var/lib/registry
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.registry.rule=Host(`registry.${ROOT_DOMAIN}`)"
      - "traefik.http.routers.registry.entrypoints=websecure"
      - "traefik.http.routers.registry.tls.certresolver=letsencrypt"
      - "traefik.http.services.registry.loadbalancer.server.port=5000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5001/debug/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  victoria-logs:
    image: victoriametrics/victoria-logs:latest
    env_file:
      - ./.env
    volumes:
      - victoria-logs-data:/vlogs
    command:
      - "-storageDataPath=/vlogs"
      - "-retentionPeriod=${VL_RETENTION:-7d}"
      - "-httpAuth.username=${VL_USERNAME}"
      - "-httpAuth.password=${VL_PASSWORD}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.logs.rule=Host(`logs.${ROOT_DOMAIN}`)"
      - "traefik.http.routers.logs.entrypoints=websecure"
      - "traefik.http.routers.logs.tls.certresolver=letsencrypt"
      - "traefik.http.services.logs.loadbalancer.server.port=9428"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9428/health || wget -q --spider http://127.0.0.1:9428/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  inngest:
    image: inngest/inngest:latest
    env_file:
      - ./.env
    environment:
      INNGEST_LOG_LEVEL: info
      INNGEST_SQLITE_DIR: "/data"
    volumes:
      - inngest-data:/data
    command:
      - "inngest"
      - "start"
      - "--sdk-url"
      - "http://web:3000/api/inngest"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8288/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  letsencrypt:
  registry-data:
  victoria-logs-data:
  inngest-data:
