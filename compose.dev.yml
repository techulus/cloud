services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
    environment:
      REGISTRY_USERNAME: docker
      REGISTRY_PASSWORD: docker
    ports:
      - "5002:5000"
    volumes:
      - registry-data:/var/lib/registry
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5001/debug/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  victoria-logs:
    image: victoriametrics/victoria-logs:latest
    ports:
      - "9428:9428"
    volumes:
      - victoria-logs-data:/vlogs
    command:
      - "-storageDataPath=/vlogs"
      - "-retentionPeriod=7d"
    restart: unless-stopped

  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    ports:
      - "8428:8428"
    volumes:
      - victoria-metrics-data:/vmdata
    command:
      - "-storageDataPath=/vmdata"
      - "-retentionPeriod=${VM_RETENTION:-30d}"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  inngest:
    image: inngest/inngest
    ports:
      - "8288:8288"
      - "8289:8289"
    command: inngest dev -u http://host.docker.internal:3000/api/inngest
    healthcheck:
      test: ["CMD", "inngest", "alpha", "doctor", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  registry-data:
  victoria-logs-data:
  victoria-metrics-data:
  postgres_data:
  minio_data:
