name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  agent:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - goos: linux
            goarch: arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Build
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X techulus/cloud-agent/internal/agent.Version=${{ github.ref_name }}" -o agent-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/agent

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/agent-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  cli:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - goos: darwin
            goarch: arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
          - goos: linux
            goarch: amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - goos: linux
            goarch: arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
          - goos: windows
            goarch: amd64
            runner: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o tc-${{ matrix.goos }}-${{ matrix.goarch }}$ext ./cmd/tc

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cli/tc-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 1

  release:
    needs: [agent, cli, containers]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Download agent artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries
          pattern: agent-*
          merge-multiple: true

      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries
          pattern: tc-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd binaries
          sha256sum agent-* tc-* > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            binaries/agent-* binaries/tc-* binaries/checksums.txt

  container:
    name: Build ${{ matrix.image }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - image: web
            context: web
            arch: amd64
            platform: linux/amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - image: web
            context: web
            arch: arm64
            platform: linux/arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
          - image: registry
            context: registry
            arch: amd64
            platform: linux/amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - image: registry
            context: registry
            arch: arm64
            platform: linux/arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
          - image: updater
            context: deployment/updater
            arch: amd64
            platform: linux/amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - image: updater
            context: deployment/updater
            arch: arm64
            platform: linux/arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: useblacksmith/build-push-action@v2
        with:
          context: ${{ matrix.context }}
          tags: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          platforms: ${{ matrix.platform }}
          build-args: ${{ matrix.image == 'web' && format('APP_VERSION={0}', github.ref_name) || '' }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  containers:
    name: Publish ${{ matrix.image }} manifest
    needs: container
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        image: [web, registry, updater]

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-platform manifest
        working-directory: /tmp/digests
        run: |
          image="ghcr.io/${{ github.repository }}/${{ matrix.image }}"
          docker buildx imagetools create \
            --tag "$image:${{ github.ref_name }}" \
            --tag "$image:tip" \
            $(printf "$image@sha256:%s " *)
