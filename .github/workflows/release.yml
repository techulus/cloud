name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  agent:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Build
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X techulus/cloud-agent/internal/agent.Version=${{ github.ref_name }}" -o agent-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/agent

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/agent-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          binary="tc-${{ matrix.goos }}-${{ matrix.goarch }}$ext"
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "$binary" ./cmd/tc

          if [ "${{ matrix.goos }}" != "windows" ]; then
            version="${GITHUB_REF_NAME#v}"
            version="${version//\//-}"
            package_dir=$(mktemp -d)
            cp "$binary" "$package_dir/tc"
            tar -czf "tc_${version}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" -C "$package_dir" tc
            rm -rf "$package_dir"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            cli/tc-${{ matrix.goos }}-${{ matrix.goarch }}*
            cli/tc_*_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          retention-days: 1

  release:
    needs: [agent, cli, web, registry, updater]
    runs-on: ubuntu-latest
    steps:
      - name: Download agent artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries
          pattern: agent-*
          merge-multiple: true

      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries
          pattern: tc-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd binaries
          sha256sum agent-* tc-* tc_* > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            binaries/agent-* binaries/tc-* binaries/tc_* binaries/checksums.txt

  homebrew:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: homebrew-tap
      cancel-in-progress: false
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries
          pattern: tc-*
          merge-multiple: true

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: techulus/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew formula
        run: |
          version="${GITHUB_REF_NAME#v}"
          darwin_amd64_sha=$(sha256sum "binaries/tc_${version}_darwin_amd64.tar.gz" | awk '{print $1}')
          darwin_arm64_sha=$(sha256sum "binaries/tc_${version}_darwin_arm64.tar.gz" | awk '{print $1}')
          linux_amd64_sha=$(sha256sum "binaries/tc_${version}_linux_amd64.tar.gz" | awk '{print $1}')
          linux_arm64_sha=$(sha256sum "binaries/tc_${version}_linux_arm64.tar.gz" | awk '{print $1}')

          cat > homebrew-tap/Formula/tc.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          # This file was generated by the Techulus Cloud release workflow. DO NOT EDIT.
          class Tc < Formula
            desc "Techulus Cloud CLI"
            homepage "https://github.com/${GITHUB_REPOSITORY}"
            version "${version}"
            license "AGPL-3.0-only"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/tc_${version}_darwin_amd64.tar.gz"
                sha256 "${darwin_amd64_sha}"

                define_method(:install) do
                  bin.install "tc"
                end
              end
              if Hardware::CPU.arm?
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/tc_${version}_darwin_arm64.tar.gz"
                sha256 "${darwin_arm64_sha}"

                define_method(:install) do
                  bin.install "tc"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/tc_${version}_linux_amd64.tar.gz"
                sha256 "${linux_amd64_sha}"

                define_method(:install) do
                  bin.install "tc"
                end
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/tc_${version}_linux_arm64.tar.gz"
                sha256 "${linux_arm64_sha}"

                define_method(:install) do
                  bin.install "tc"
                end
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/tc version")
            end
          end
          EOF

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tc.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula is already up to date."
            exit 0
          fi
          git commit -m "Brew formula update for tc version ${GITHUB_REF_NAME}"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to push the Homebrew formula after $attempt attempts." >&2
              exit 1
            fi
            git pull --rebase origin main
          done

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/web:tip
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: registry
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/registry:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/registry:tip
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=registry
          cache-to: type=gha,mode=max,scope=registry

  updater:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: deployment/updater
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/updater:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/updater:tip
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=updater
          cache-to: type=gha,mode=max,scope=updater
